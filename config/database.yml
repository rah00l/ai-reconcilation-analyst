# PostgreSQL. Versions 9.3 and up are supported.
default: &default
  adapter: postgresql
  encoding: unicode
  # For details on connection pooling, see Rails configuration guide
  # https://guides.rubyonrails.org/configuring.html#database-connection-pooling
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: reconciliation_development
  host: localhost
  username: postgres
  password: postgres
  port: 5432

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: reconciliation_test
  host: localhost
  username: postgres
  password: postgres
  port: 5432

production:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>
