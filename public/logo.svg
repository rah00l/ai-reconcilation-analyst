<svg 
  viewBox="0 0 64 64" 
  width="64" 
  height="64"
  xmlns="http://www.w3.org/2000/svg">
  
  <!-- Background Circle - Blue -->
  <circle cx="32" cy="32" r="32" fill="#2563eb"/>
  
  <!-- Subtle gradient effect -->
  <defs>
    <linearGradient id="rpGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with gradient -->
  <circle cx="32" cy="32" r="32" fill="url(#rpGradient)"/>
  
  <!-- RP Text - Main Logo -->
  <g>
    <!-- R -->
    <text 
      x="24" 
      y="40" 
      font-family="Arial, Helvetica, sans-serif" 
      font-size="28" 
      font-weight="bold" 
      fill="white" 
      text-anchor="middle">
      R
    </text>
    
    <!-- P -->
    <text 
      x="40" 
      y="40" 
      font-family="Arial, Helvetica, sans-serif" 
      font-size="28" 
      font-weight="bold" 
      fill="white" 
      text-anchor="middle">
      P
    </text>
  </g>
  
  <!-- Optional: Small accent line under RP -->
  <line 
    x1="18" 
    y1="48" 
    x2="46" 
    y2="48" 
    stroke="white" 
    stroke-width="1.5" 
    opacity="0.6"
  />
  
  <!-- Optional: Subtle AI accent (small circuit dots) -->
  <circle cx="50" cy="15" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="55" cy="20" r="1.5" fill="white" opacity="0.8"/>
  <line x1="50" y1="15" x2="55" y2="20" stroke="white" stroke-width="0.8" opacity="0.6"/>
</svg>
