version: '3.9'

services:
  # PostgreSQL Database Service
  db:
    image: postgres:15
    container_name: ai-reconciliation-db
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-reconciliation_development}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Rails Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-reconciliation-web
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy        # Wait for database to be healthy
      engine:
        condition: service_started
    environment:
      RAILS_ENV: ${RAILS_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/reconciliation_development}
      ENGINE_URL: http://engine:4567
      ENGINE_TIMEOUT: 30
      RAILS_LOG_TO_STDOUT: 'true'
      HTTP_AUTH_USER: ${HTTP_AUTH_USER:-demo}
      HTTP_AUTH_PASSWORD: ${HTTP_AUTH_PASSWORD:-demo123}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-development-secret-key}
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY:-}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.git
      - /app/tmp
      - /app/log
    command: >
      bash -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        echo 'Running migrations...' &&
        bundle exec rake db:prepare &&
        echo 'Starting Rails...' &&
        bundle exec rails server -b 0.0.0.0 -p 3000
      "
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Sinatra AI Analyst Engine
  engine:
    build:
      context: ../ai-analyst-engine
      dockerfile: Dockerfile
    container_name: ai-analyst-engine
    ports:
      - "4567:4567"
    environment:
      RACK_ENV: ${RAILS_ENV:-development}
      PORT: 4567
    volumes:
      - ../ai-analyst-engine:/app
    # Explicitly specify path to config.ru (engine has it in sinatra/ subdirectory)
    command: bundle exec rackup /app/sinatra/config.ru -o 0.0.0.0 -p 4567
    networks:
      - app_network
    healthcheck:
      # Tests if the engine can actually process requests
      test: ["CMD", "curl", "-f", "-X", "POST", "http://localhost:4567/analyze", "-H", "Content-Type: application/json", "-d", "{\"question\":\"test\",\"session_id\":\"health\"}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
